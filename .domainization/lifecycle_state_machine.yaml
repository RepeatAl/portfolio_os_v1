# Lifecycle State Machines
# Defines valid states and transitions for each artifact type

artifact_types:
  # SSOT: Single Source of Truth documents
  SSOT:
    description: "Canonical specification documents that define system behavior"
    states:
      - draft
      - review
      - canonical
      - deprecated
    initial_state: draft
    transitions:
      - from: draft
        to: review
        condition: "Author completes initial version and requests review"
      - from: review
        to: canonical
        condition: "Domain owner approves document as authoritative"
      - from: review
        to: draft
        condition: "Reviewer requests revisions"
      - from: canonical
        to: draft
        condition: "Major revision required, document temporarily loses canonical status"
      - from: canonical
        to: deprecated
        condition: "Superseded by new version or no longer applicable"
    modifiable_states:
      - draft
      - review
      - canonical
    read_only_states:
      - deprecated

  # ENGINE: Implementation code that executes business logic
  ENGINE:
    description: "Python modules that implement signal generation, semantic interpretation, reasoning, or reporting"
    states:
      - planned
      - development
      - active
      - deprecated
    initial_state: planned
    transitions:
      - from: planned
        to: development
        condition: "Implementation work begins"
      - from: development
        to: active
        condition: "Engine is production-ready and deployed"
      - from: development
        to: development
        condition: "Iterative development allowed in this state"
      - from: active
        to: development
        condition: "Bug fixes or enhancements required"
      - from: active
        to: deprecated
        condition: "Replaced by new engine or no longer needed"
      - from: development
        to: deprecated
        condition: "Development abandoned"
    modifiable_states:
      - planned
      - development
      - active
    read_only_states:
      - deprecated

  # REPORT_OUT: Generated human-readable reports
  REPORT_OUT:
    description: "Text reports generated for portfolio managers"
    states:
      - generated
      - current
      - archived
    initial_state: generated
    transitions:
      - from: generated
        to: current
        condition: "Becomes the latest version of the report"
      - from: current
        to: archived
        condition: "Superseded by newer report"
    modifiable_states: []
    regenerable_states:
      - generated
      - current
    read_only_states:
      - archived

  # DATA_IN: Input data files consumed by the system
  DATA_IN:
    description: "External data files ingested into the system"
    states:
      - active
      - stale
      - archived
    initial_state: active
    transitions:
      - from: active
        to: stale
        condition: "Data becomes outdated or superseded"
      - from: stale
        to: archived
        condition: "Moved to historical storage"
      - from: active
        to: archived
        condition: "Direct archival without stale period"
    modifiable_states:
      - active
    read_only_states:
      - stale
      - archived

  # DATA_OUT: Output data files generated by engines
  DATA_OUT:
    description: "Structured data files produced by signal, semantic, or reasoning engines"
    states:
      - generated
      - current
      - archived
    initial_state: generated
    transitions:
      - from: generated
        to: current
        condition: "Becomes the latest version of the data"
      - from: current
        to: archived
        condition: "Superseded by newer data"
    modifiable_states: []
    regenerable_states:
      - generated
      - current
    read_only_states:
      - archived

  # RUNTIME: Execution entry points and orchestration scripts
  RUNTIME:
    description: "Scripts that orchestrate system execution"
    states:
      - development
      - active
      - deprecated
    initial_state: development
    transitions:
      - from: development
        to: active
        condition: "Runtime script is production-ready"
      - from: active
        to: development
        condition: "Modifications required"
      - from: active
        to: deprecated
        condition: "Replaced by new runtime or no longer used"
      - from: development
        to: deprecated
        condition: "Development abandoned"
    modifiable_states:
      - development
      - active
    read_only_states:
      - deprecated

  # DASHBOARD: User interface and visualization components
  DASHBOARD:
    description: "Frontend applications for user interaction"
    states:
      - development
      - active
      - deprecated
    initial_state: development
    transitions:
      - from: development
        to: active
        condition: "Dashboard is production-ready"
      - from: active
        to: development
        condition: "Modifications required"
      - from: active
        to: deprecated
        condition: "Replaced by new dashboard or no longer used"
      - from: development
        to: deprecated
        condition: "Development abandoned"
    modifiable_states:
      - development
      - active
    read_only_states:
      - deprecated

  # SNAPSHOT: Historical point-in-time captures
  SNAPSHOT:
    description: "Historical snapshots of portfolio state or market data"
    states:
      - captured
      - archived
    initial_state: captured
    transitions:
      - from: captured
        to: archived
        condition: "Moved to long-term storage"
    modifiable_states: []
    regenerable_states:
      - captured
    read_only_states:
      - archived

  # CONFIG: Configuration files
  CONFIG:
    description: "System configuration and settings files"
    states:
      - draft
      - active
      - deprecated
    initial_state: draft
    transitions:
      - from: draft
        to: active
        condition: "Configuration validated and deployed"
      - from: active
        to: draft
        condition: "Modifications required"
      - from: active
        to: deprecated
        condition: "Configuration no longer used"
      - from: draft
        to: deprecated
        condition: "Configuration abandoned"
    modifiable_states:
      - draft
      - active
    read_only_states:
      - deprecated

  # CALIBRATION: System calibration and tuning documents
  CALIBRATION:
    description: "Documents that record system calibration decisions and parameter tuning"
    states:
      - draft
      - active
      - superseded
    initial_state: draft
    transitions:
      - from: draft
        to: active
        condition: "Calibration validated and applied"
      - from: active
        to: superseded
        condition: "New calibration replaces this one"
      - from: draft
        to: superseded
        condition: "Calibration abandoned without activation"
    modifiable_states:
      - draft
      - active
    read_only_states:
      - superseded

  # STEERING: Kiro steering rules and guidance
  STEERING:
    description: "Kiro AI steering rules that guide agent behavior"
    states:
      - draft
      - active
      - deprecated
    initial_state: draft
    transitions:
      - from: draft
        to: active
        condition: "Steering rule validated and enabled"
      - from: active
        to: draft
        condition: "Modifications required"
      - from: active
        to: deprecated
        condition: "Steering rule no longer needed"
      - from: draft
        to: deprecated
        condition: "Steering rule abandoned"
    modifiable_states:
      - draft
      - active
    read_only_states:
      - deprecated

# General Rules:
# - initial_state: The state assigned to new artifacts of this type
# - modifiable_states: States where artifact content can be freely edited by humans
# - regenerable_states: States where artifact content can be overwritten by automated
#   engine runs (daily regeneration). Distinct from modifiable — regenerable artifacts
#   are NOT freely editable, but ARE overwritable by their generating system.
#   This separates: immutability ≠ regeneration ability
# - read_only_states: States where only metadata can be modified (content is frozen)
# - Deprecated/archived artifacts cannot be modified (except metadata updates)
