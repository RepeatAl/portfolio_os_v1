    primary_domain: ARCH
    artifact_type: SSOT
    lifecycle_status: canonical
    created_date: "2026-01-15"
    last_modified: "2026-05-20"
    owner_role: System architect
    ssot_relationship: canonical
    allowed_writers:
      - ARCH
    allowed_readers:
