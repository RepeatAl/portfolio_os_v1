# =============================================================================
# Domainization System Configuration
# =============================================================================
#
# This file configures the domainization governance system for Portfolio OS.
#
# CURRENT PHASE: FAST LANE REPORT MVP
# ENFORCEMENT MODE: observability (warnings only, no blocking)
#
# During the FAST LANE phase, the system operates in observability-only mode:
# - All validation observers generate warnings, never errors
# - Commits are NEVER blocked by governance rules
# - Violations are logged for visibility and future enforcement
# - Registry enforcement remains soft-validation only
# - Governance does not block report development
#
# This approach ensures:
# - A visible unhealthy system is preferable to an invisible blocked system
# - Report development velocity is preserved
# - Governance value is demonstrated before enforcement is activated
# - Developers gain awareness without friction
#
# Requirements Satisfied:
#   5.9  - Commit gates deferred until MVP stabilizes
#   5.10 - Governance shall not block report development
#   9.8  - Registry enforcement remains soft-validation only
#
# =============================================================================

# -----------------------------------------------------------------------------
# Enforcement Mode
# -----------------------------------------------------------------------------
# Controls how validation observers behave:
#
#   observability - Warnings only, no blocking (FAST LANE phase)
#                   All observers report violations but never prevent commits.
#                   This is the default during FAST LANE REPORT MVP.
#
#   soft          - Warnings with audit trail, no blocking
#                   Similar to observability but with stricter audit logging.
#                   Suitable for transition period after MVP stabilizes.
#
#   hard          - Blocking mode, violations prevent commits
#                   Full enforcement. Only activate after report value is
#                   established and MVP is stable.
#
enforcement_mode: observability

# -----------------------------------------------------------------------------
# System Phase
# -----------------------------------------------------------------------------
# Documents the current development phase for governance decisions.
#
# Phases:
#   fast_lane_report_mvp - Current phase. Report development takes priority.
#                          No governance friction allowed.
#   post_mvp_transition  - Report value established. Gradual enforcement begins.
#   full_enforcement     - All gates active and blocking.
#
current_phase: fast_lane_report_mvp

# -----------------------------------------------------------------------------
# Observers Configuration
# -----------------------------------------------------------------------------
# Each observer can be individually enabled/disabled.
# In observability mode, enabled observers generate warnings only.
#
observers:
  RegistrationValidator:
    enabled: true
    description: "Detects unregistered artifacts and missing metadata"
  DomainAssignmentValidator:
    enabled: true
    description: "Detects invalid domain assignments"
  LifecycleValidator:
    enabled: true
    description: "Detects invalid lifecycle transitions"
  BoundaryAwarenessValidator:
    enabled: true
    description: "Detects authority chain violations, cloud provider issues, runtime flow violations"
  SSOTConsistencyValidator:
    enabled: true
    description: "Detects SSOT conflicts and missing references"

# -----------------------------------------------------------------------------
# Performance Settings
# -----------------------------------------------------------------------------
# Performance targets for validation and reporting operations.
#
performance:
  # Maximum time for commit gate validation (milliseconds)
  # Requirement 15.1: Commit gates SHALL complete in less than 5 seconds
  validation_timeout_ms: 5000

  # Maximum time for health report generation (milliseconds)
  # Requirement 15.3: Health reports SHALL complete in less than 10 seconds
  health_report_timeout_ms: 10000

# -----------------------------------------------------------------------------
# Logging Settings
# -----------------------------------------------------------------------------
# Controls audit logging and log verbosity.
#
logging:
  # Log level: DEBUG, INFO, WARNING, ERROR
  level: INFO

  # Whether to write audit logs for all validation events
  # Audit logs track: registrations, transitions, violations, bypasses
  audit_enabled: true

  # Log directory (relative to .domainization/)
  log_directory: logs

# -----------------------------------------------------------------------------
# FAST LANE Phase Rules
# -----------------------------------------------------------------------------
# These rules document the governance constraints during FAST LANE phase.
# They are informational and enforced by the observability mode setting above.
#
fast_lane_rules:
  # Commit gates are deferred - no blocking behavior (Req 5.9)
  commit_gates_deferred: true

  # Governance shall not block report development (Req 5.10)
  report_development_unblocked: true

  # Registry enforcement is soft-validation only (Req 9.8)
  registry_soft_validation_only: true

  # Features without report value are warned, not blocked
  report_value_enforcement: warning_only

  # Cloud provider detection generates warnings, not blocks
  cloud_provider_enforcement: warning_only

  # Runtime flow violations generate warnings, not blocks
  runtime_flow_enforcement: warning_only

# -----------------------------------------------------------------------------
# Migration Configuration
# -----------------------------------------------------------------------------
# Controls behavior during gradual migration to full governance.
#
migration:
  # Allow unregistered artifacts during migration (Req 9.3)
  allow_unregistered: true

  # Current migration phase
  # Phases: foundation, registration, commit_gates, lifecycle_enforcement,
  #         boundary_enforcement, monitoring
  current_migration_phase: registration

  # Whether to require metadata for new artifacts (false during FAST LANE)
  require_metadata_for_new: false
