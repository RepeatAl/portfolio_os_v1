name: Portfolio OS Governance Check

on:
  push:
    branches:
      - main
      - governance/**
      - feature/**
      - fix/**
      - spec/**

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  governance-check:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip

        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi

    - name: Validate Python syntax
      run: |
        python -m compileall .

    - name: Validate critical engine imports
      run: |
        python -c "import engines.allocation_engine"
        python -c "import engines.report_engine"

    - name: Repository governance summary
      run: |
        echo "Portfolio OS governance validation completed."
